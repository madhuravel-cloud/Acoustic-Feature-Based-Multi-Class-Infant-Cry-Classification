<html>
    <head>
        <title>Acoustic infant cry classifier</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>Acoustic infant cry classifier</h1>
        <p>This is a simple web page for the acoustic infant cry classifier.</p>
        <form action="/predict" method="POST" enctype="multipart/form-data">

        <input
            type="file"
            name="audio"
            accept="audio/*"
            required
        >

        <br><br>

        <button type="submit">
            Predict
        </button>

    </form>
    </body>
</html>
